<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Pacientes | ClinicaCitasApi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/assets/css/clinic.css" rel="stylesheet">
</head>
<body onload="loadPacientes()">
  <nav class="navbar navbar-dark py-3">
    <div class="container">
      <div class="d-flex align-items-center gap-3">
        <a class="brand-badge rounded-4 px-3 py-2 text-white text-decoration-none" href="/dashboard.html">
          <i class="bi bi-hospital me-2"></i><strong>ClinicaCitasApi</strong>
        </a>
        <span class="text-white-50">Pacientes</span>
      </div>
      <div class="d-flex gap-2">
        <a class="btn btn-light btn-clinic" href="/swagger"><i class="bi bi-journal-text me-2"></i>Swagger</a>
      </div>
    </div>
  </nav>

  <main class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h2 class="mb-0">Pacientes</h2>
        <div class="muted">Total: <strong id="countPacientes">—</strong></div>
      </div>
      <a class="btn btn-primary btn-clinic" href="/citas.html"><i class="bi bi-calendar-event me-2"></i>Ver Citas</a>
    </div>

    <div class="card card-soft">
      <div class="card-body">
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead>
              <tr>
                <th>ID</th>
                <th>Paciente</th>
                <th>Teléfono</th>
                <th>Email</th>
              </tr>
            </thead>
            <tbody id="pacientesBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="/assets/js/app.js"></script>
</body>
</html>
